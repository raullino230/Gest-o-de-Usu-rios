<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <div class="container">
     <h1 class="text-center">Gestão de Clientes</h1>

     <!--Formulário de cliente-->
     <div id="form-cliente">
     {% include 'form_cliente.html' %}
     <hr>
     </div>

     <!--Lista de cliente-->
     <h2>Lista de clientes</h2>
     {% include 'lista_template.html' %}
   </div>

   <!-- Modal Bootstrap para detalhes do cliente -->
<div class="modal fade" id="modalCliente" tabindex="-1" aria-labelledby="modalClienteLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalClienteLabel">Detalhes do Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p><strong>ID:</strong> <span id="modalClienteId"></span></p>
        <p><strong>Nome:</strong> <span id="modalClienteNome"></span></p>
        <p><strong>Email:</strong> <span id="modalClienteEmail"></span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
<script>
function abrirModalCliente(id, nome, email) {
  document.getElementById('modalClienteId').textContent = id;
  document.getElementById('modalClienteNome').textContent = nome;
  document.getElementById('modalClienteEmail').textContent = email;
  var modal = new bootstrap.Modal(document.getElementById('modalCliente'));
  modal.show();
}
</script>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='js/cru.js') }}"></script>
  </body>
</html>
